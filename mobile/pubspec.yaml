name: natca_qos
description: "A premium, futuristic cross-platform Telecom Drive Test & QoS/QoE mobile app for Android and iOS."
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^14.2.0

  # Data Visualization
  fl_chart: ^0.68.0

  # Networking
  http: ^1.2.1

  # Device & Utilities
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/ic_launcher.png"
  adaptive_icon_background: "assets/icons/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icons/ic_launcher_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
