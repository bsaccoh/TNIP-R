upstream tnipr_backend {
    server backend:4000;
}

upstream tnipr_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 120m;   # allow large PM file uploads

    # API → backend (keeps /api/v1 prefix)
    location /api/ {
        proxy_pass         http://tnipr_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;     # long-running ingestion/report jobs
    }

    # Swagger docs
    location /docs {
        proxy_pass       http://tnipr_backend;
        proxy_set_header Host $host;
    }

    # Everything else → React SPA
    location / {
        proxy_pass       http://tnipr_frontend;
        proxy_set_header Host $host;
    }
}
